<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Diplomatic Crisis Engine</title>
    <style>
        :root {
            --bg: #0b0f19;
            --panel: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --text-muted: #64748b;
            --border: #334155;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 2rem; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 900px; }
        header { text-align: center; margin-bottom: 2rem; }
        h1 { color: var(--text); margin-bottom: 0.5rem; }
        .panel { background: var(--panel); border: 1px solid var(--border); padding: 2rem; border-radius: 12px; margin-bottom: 2rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 0.5rem; color: var(--accent); font-weight: 700; }
        select, textarea, input { width: 100%; background: #0f172a; border: 1px solid var(--border); padding: 0.75rem; color: var(--text); border-radius: 6px; font-size: 1rem; outline: none; }
        select:focus, textarea:focus { border-color: var(--accent); }
        textarea { height: 100px; resize: none; }
        .full-width { grid-column: span 2; }
        button { width: 100%; background: var(--accent); color: #000; border: none; padding: 1rem; border-radius: 6px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        button:disabled { background: var(--text-muted); cursor: not-allowed; }
        .output-box { background: #0f172a; border-left: 4px solid var(--accent); padding: 1.5rem; border-radius: 0 8px 8px 0; display: none; line-height: 1.6; white-space: pre-wrap; }
        .loader { display: none; text-align: center; color: var(--accent); margin: 1rem 0; font-weight: bold; }
        @media(max-width: 768px) { .grid { grid-template-columns: 1fr; } .full-width { grid-column: span 1; } }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <h1>MUN Diplomatic Crisis Engine</h1>
        <p>Live Backend Powered via Make.com Automation</p>
    </header>

    <div class="panel">
        <div class="grid">
            <div class="form-group">
                <label>Committee</label>
                <select id="committee">
                    <option value="DISEC">DISEC (Disarmament & Security)</option>
                    <option value="SOCHUM">SOCHUM (Social, Humanitarian & Cultural)</option>
                    <option value="ECOFIN">ECOFIN (Economic & Financial)</option>
                    <option value="UNSC">UNSC (Security Council)</option>
                    <option value="UNHRC">UNHRC (Human Rights Council)</option>
                    <option value="UNEA">UNEA (Environment Assembly)</option>
                    <option value="Legal">LEGAL (Sixth Committee)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Your Country</label>
                <select id="country">
                    <!-- Populated via Javascript dynamically to save space -->
                </select>
            </div>

            <div class="form-group full-width">
                <label>Describe the Situation / Accusation / Motion</label>
                <textarea id="situation" placeholder="Example: The delegate of RoK accused us of state-sponsored cyber espionage targeting satellite arrays during yesterday's unmod..."></textarea>
            </div>
        </div>

        <button id="submitBtn" onclick="sendToMake()">Generate Diplomatic Response</button>
        <div id="loader" class="loader">Consulting AI Attaché...</div>
    </div>

    <div id="output" class="output-box"></div>
</div>

<script>
    // Paste your Make.com Custom Webhook URL here
    const MAKE_WEBHOOK_URL = "YOUR_MAKE_WEBHOOK_URL_HERE";

    const countries = ["Afghanistan","Albania","Algeria","Andorra","Angola","Antigua and Barbuda","Argentina","Armenia","Australia","Austria","Azerbaijan","Bahamas","Bahrain","Bangladesh","Barbados","Belarus","Belgium","Belize","Benin","Bhutan","Bolivia","Bosnia and Herzegovina","Botswana","Brazil","Brunei","Bulgaria","Burkina Faso","Burundi","Cabo Verde","Cambodia","Cameroon","Canada","Central African Republic","Chad","Chile","China","Colombia","Comoros","Congo","Costa Rica","Croatia","Cuba","Cyprus","Czech Republic","Denmark","Djibouti","Dominica","Dominican Republic","Ecuador","Egypt","El Salvador","Equatorial Guinea","Eritrea","Estonia","Eswatini","Ethiopia","Fiji","Finland","France","Gabon","Gambia","Georgia","Germany","Ghana","Greece","Grenada","Guatemala","Guinea","Guinea-Bissau","Guyana","Haiti","Honduras","Hungary","Iceland","India","Indonesia","Iran","Iraq","Ireland","Israel","Italy","Jamaica","Japan","Jordan","Kazakhstan","Kenya","Kiribati","Kuwait","Kyrgyzstan","Laos","Latvia","Lebanon","Lesotho","Liberia","Libya","Liechtenstein","Lithuania","Luxembourg","Madagascar","Malawi","Malaysia","Maldives","Mali","Malta","Marshall Islands","Mauritania","Mauritius","Mexico","Micronesia","Moldova","Monaco","Mongolia","Montenegro","Morocco","Mozambique","Myanmar","Namibia","Nauru","Nepal","Netherlands","New Zealand","Nicaragua","Niger","Nigeria","North Korea","North Macedonia","Norway","Oman","Pakistan","Palau","Palestine","Panama","Papua New Guinea","Paraguay","Peru","Philippines","Poland","Portugal","Qatar","Romania","Russia","Rwanda","Saint Kitts and Nevis","Saint Lucia","Saint Vincent","Samoa","San Marino","Sao Tome and Principe","Saudi Arabia","Senegal","Serbia","Seychelles","Sierra Leone","Singapore","Slovakia","Slovenia","Solomon Islands","Somalia","South Africa","South Korea","South Sudan","Spain","Sri Lanka","Sudan","Suriname","Sweden","Switzerland","Syria","Tajikistan","Tanzania","Thailand","Timor-Leste","Togo","Tonga","Trinidad and Tobago","Tunisia","Turkey","Turkmenistan","Tuvalu","Uganda","Ukraine","United Arab Emirates","United Kingdom","United States","Uruguay","Uzbekistan","Vanuatu","Venezuela","Vietnam","Yemen","Zambia","Zimbabwe"];
    
    const select = document.getElementById('country');
    countries.forEach(c => {
        let opt = document.createElement('option');
        opt.value = c;
        opt.innerHTML = c;
        select.appendChild(opt);
    });

    async function sendToMake() {
        const committee = document.getElementById('committee').value;
        const country = document.getElementById('country').value;
        const situation = document.getElementById('situation').value;
        const output = document.getElementById('output');
        const loader = document.getElementById('loader');
        const btn = document.getElementById('submitBtn');

        if (!situation.trim()) {
            alert("Please enter a situation context first!");
            return;
        }

        if(MAKE_WEBHOOK_URL.includes("YOUR_MAKE_WEBHOOK_URL_HERE")) {
            alert("Please update the MAKE_WEBHOOK_URL variable in the code script first!");
            return;
        }

        // UI States
        output.style.display = 'none';
        loader.style.display = 'block';
        btn.disabled = true;

        try {
            const response = await fetch(MAKE_WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ committee, country, situation })
            });
            
            const dynamicText = await response.text();
            output.innerText = dynamicText;
            output.style.display = 'block';
        } catch (error) {
            alert("Error communicating with backend engine.");
            console.error(error);
        } finally {
            loader.style.display = 'none';
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
